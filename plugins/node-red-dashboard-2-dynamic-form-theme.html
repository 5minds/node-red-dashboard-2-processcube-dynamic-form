<script type="text/javascript">
    RED.plugins.registerPlugin('node-red-dashboard-2-dynamic-form-theme', {
        type: 'node-red-dashboard-2',
        tabs: [
            {
                id: 'dynamic-form-theme',
                label: 'Dynamic Form Theme',
                /**
                 * Runs when tabs are first created
                 * @param {object} base - ui-base node for which this sidebar represents
                 * @param {object} parent - DOM element to append content to
                 */
                init(base, parent) {
                    function mapDefaults(defaults) {
                        const values = {};
                        for (const key in defaults) {
                            if (Object.prototype.hasOwnProperty.call(defaults, key)) {
                                values[key] = defaults[key].value;
                            }
                        }
                        return values;
                    }

                    function addConfigNode(node) {
                        console.log('adding node...');
                        if (!node.users) {
                            node.users = [];
                        }
                        node.dirty = true;
                        RED.nodes.add(node);
                        RED.editor.validateNode(node);
                        RED.history.push({
                            t: 'add',
                            nodes: [node.id],
                            dirty: RED.nodes.dirty(),
                        });
                        RED.nodes.dirty(true);
                    }

                    function addDefaultTheme() {
                        const theme = RED.nodes.getType('dynamic-form-theme');
                        const themeNode = {
                            _def: theme,
                            id: RED.nodes.id(),
                            type: 'dynamic-form-theme',
                            ...mapDefaults(theme.defaults),
                            name: 'ProcessCube Default Theme',
                        };

                        addConfigNode(themeNode);
                        console.log('node added');

                        const listItem = $('<div>', { class: 'list-item' }).appendTo(themeList);
                        listItem.append($('<p>', { class: 'list-item-text', text: theme.name }));
                        $(
                            '<button class="editor-button editor-button-small nr-db-sb-list-header-button"><i class="fa fa-paint-brush"></i> ' +
                                'Edit' +
                                '</button>'
                        )
                            .click(function (evt) {
                                RED.editor.editConfig('', theme.type, theme.id);
                                evt.preventDefault();
                            })
                            .appendTo(listItem);

                        return themeNode;
                    }

                    const tab = $('<div>', { class: 'dynamicform-tab' }).appendTo(parent);
                    const headerDiv = $('<div>', { class: 'header-div' }).appendTo(tab);
                    const themeList = $('<div>', { class: 'theme-list' }).appendTo(tab);

                    headerDiv.append($('<b>', { text: 'DynamicForm Themes' }));
                    $(
                        '<button class="editor-button editor-button-small nr-db-sb-list-header-button"><i class="fa fa-plus"></i> ' +
                            'Add DynamicForm Theme' +
                            '</button>'
                    )
                        .click(function (evt) {
                            const themeResult = addDefaultTheme();
                            RED.editor.editConfig('', themeResult.type, themeResult.id);
                        })
                        .appendTo(headerDiv);

                    let themes = {};

                    RED.nodes.eachConfig(function (n) {
                        if (n.type === 'dynamic-form-theme') {
                            themes[n.id] = n;
                        }
                    });

                    Object.values(themes).forEach(function (theme) {
                        const listItem = $('<div>', { class: 'list-item' }).appendTo(themeList);
                        listItem.append($('<p>', { class: 'list-item-text', text: theme.name }));
                        $(
                            '<button class="editor-button editor-button-small nr-db-sb-list-header-button"><i class="fa fa-paint-brush"></i> ' +
                                'Edit' +
                                '</button>'
                        )
                            .click(function (evt) {
                                // if (themes.includes(itemc)) {
                                //     RED.editor.editConfig('', item.type, item.id);
                                // } else {
                                //     RED.editor.edit(item?.node);
                                // }

                                RED.editor.editConfig('', theme.type, theme.id);
                                evt.stopPropagation();
                                evt.preventDefault();
                            })
                            .appendTo(listItem);
                    });
                },
            },
        ],
        auth: false,
        description: '',
    });
</script>

    }

    .dynamicform-button {
        height: 20px;

    }

    }
